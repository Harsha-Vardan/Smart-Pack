<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – Pack Smart</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card glass-card">
      <h1>🎒 Create Account</h1>
      <p class="subtitle">Start optimizing your packing today</p>
      <div class="auth-error" id="authError"></div>
      <form id="signupForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Choose a username" required minlength="3" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Create a password (min 6 chars)" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm your password" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" id="signupBtn">Create Account</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a href="login.html">Log In</a>
      </div>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
