<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – Pack Smart</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="/" class="nav-logo">🎒 PackSmart</a>
      <div class="nav-user">
        <span id="navUsername">User</span>
        <button class="btn btn-sm btn-secondary" id="logoutBtn" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <div class="toast-container" id="toastContainer"></div>

  <main class="dashboard">
    <div class="container">
      <!-- Add Item Panel -->
      <div class="glass-card" style="margin-bottom:24px;">
        <div class="panel-header">
          <h2>📦 Add New Item</h2>
        </div>
        <div class="add-form" id="addForm">
          <div class="form-group">
            <label for="itemName">Item Name</label>
            <input type="text" id="itemName" placeholder="e.g., Laptop">
          </div>
          <div class="form-group">
            <label for="itemWeight">Weight (kg)</label>
            <input type="number" id="itemWeight" placeholder="e.g., 2.0" step="0.1" min="0.1">
          </div>
          <div class="form-group">
            <label for="itemImportance">Importance (1-10)</label>
            <div class="range-wrapper">
              <input type="range" id="itemImportance" min="1" max="10" value="5">
              <span class="range-value" id="importanceVal">5</span>
            </div>
          </div>
          <button class="btn btn-primary" onclick="addItem()">+ Add</button>
        </div>
      </div>

      <div class="dash-grid">
        <!-- Items List -->
        <div class="glass-card">
          <div class="panel-header">
            <h2>🎒 My Items</h2>
            <span id="itemCount" style="color:var(--text-secondary);font-size:0.9rem;">0 items</span>
          </div>
          <div class="items-list" id="itemsList">
            <div class="empty-state"><div class="icon">📭</div><p>No items yet. Add your first item above!</p></div>
          </div>
        </div>

        <!-- Bag Capacity + Optimize -->
        <div>
          <div class="glass-card" style="margin-bottom:24px;">
            <div class="panel-header"><h2>⚖️ Bag Capacity</h2></div>
            <div class="form-group">
              <label for="bagCapacity">Maximum Weight (kg)</label>
              <input type="number" id="bagCapacity" value="10" min="1" step="0.5" onchange="updateCapacity()">
            </div>
            <div class="capacity-display">
              <div class="capacity-visual"><div class="capacity-fill" id="capacityFill" style="width:0%"></div></div>
              <div class="capacity-text" id="capacityText">0 / 10 kg</div>
            </div>
          </div>

          <div class="glass-card" style="text-align:center;">
            <h2 style="margin-bottom:16px;">🚀 Ready to Optimize?</h2>
            <p style="color:var(--text-secondary);margin-bottom:24px;">Run the Knapsack DP algorithm to find your optimal packing list.</p>
            <button class="btn btn-primary" id="optimizeBtn" onclick="optimize()" style="font-size:1.1rem;padding:16px 48px;">
              ⚡ Optimize Packing
            </button>
          </div>
        </div>
      </div>

      <!-- Results -->
      <div class="results-panel glass-card" id="resultsPanel" style="margin-top:24px;">
        <div class="panel-header"><h2>📊 Optimization Results</h2></div>
        <div class="stats-grid" id="statsGrid"></div>
        <div id="selectedSection" class="result-section"></div>
        <div id="excludedSection" class="result-section"></div>
        <div class="processing-info" id="processingInfo"></div>
      </div>

      <div style="height:60px;"></div>
    </div>
  </main>

  <script src="js/dashboard.js"></script>
</body>
</html>
